name: Build StreamTV APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o g.zip && unzip -q g.zip
          ./gradle-8.4/bin/gradle wrapper && chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: StreamTV-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
